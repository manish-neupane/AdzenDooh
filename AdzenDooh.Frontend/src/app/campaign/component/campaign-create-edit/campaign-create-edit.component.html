<!-- ─── campaign-create-edit.component.html ──────────────────────────────────
     3-step wizard dialog for creating a campaign.
     Class names match campaign-create-edit.component.scss exactly.
     ─────────────────────────────────────────────────────────────────────── -->

<p-dialog
  [(visible)]="isOpen"
  header="Create Campaign"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '58rem' }"
  appendTo="body"
  [blockScroll]="false"
  (onHide)="onHide()"
>
  <ng-template pTemplate="content">
    <!-- ── Step Indicator ── -->
    <p-steps
      [model]="steps"
      [activeIndex]="activeStep"
      [readonly]="true"
      styleClass="mb-4"
    />

    <form [formGroup]="formGroup" class="p-fluid">
      <!-- ───────────────────────────────────────────────────────────────── -->
      <!-- Step 1: Details                                                   -->
      <!-- ───────────────────────────────────────────────────────────────── -->
      <ng-container *ngIf="activeStep === 0">
        <div class="field">
          <label for="name">
            Campaign Name <span class="required">*</span>
          </label>
          <input
            id="name"
            type="text"
            pInputText
            formControlName="name"
            placeholder="e.g. Summer Campaign 2026"
          />
          <small
            *ngIf="
              formGroup.get('name')?.invalid && formGroup.get('name')?.touched
            "
            class="p-error"
          >
            Name is required.
          </small>
        </div>

        <div class="field">
          <label for="remarks">Remarks</label>
          <textarea
            id="remarks"
            pTextarea
            formControlName="remarks"
            rows="4"
            placeholder="Optional notes about this campaign"
          ></textarea>
        </div>
      </ng-container>

      <!-- ───────────────────────────────────────────────────────────────── -->
      <!-- Step 2: Screens                                                   -->
      <!-- ───────────────────────────────────────────────────────────────── -->
      <ng-container *ngIf="activeStep === 1">
        <p class="step-hint">Select the screens this campaign will run on.</p>

        <div formArrayName="screenSelections" class="screen-list">
          <div
            *ngFor="let screen of availableScreens; let i = index"
            class="screen-row"
            [class.is-checked]="screenSelections.controls[i].value"
            (click)="
              screenSelections.controls[i].setValue(
                !screenSelections.controls[i].value
              )
            "
          >
            <p-checkbox
              [formControl]="$any(screenSelections.controls[i])"
              [binary]="true"
              [inputId]="'screen_' + i"
              (click)="$event.stopPropagation()"
            />
            <div class="screen-info">
              <span class="screen-name">{{ screen.name }}</span>
              <span class="screen-location">{{ screen.location }}</span>
            </div>
          </div>

          <div *ngIf="availableScreens.length === 0" class="no-screens">
            <i
              class="pi pi-desktop mb-2"
              style="font-size: 1.5rem; display: block"
            ></i>
            No screens available.
          </div>
        </div>
      </ng-container>

      <!-- ───────────────────────────────────────────────────────────────── -->
      <!-- Step 3: Dates                                                     -->
      <!-- ───────────────────────────────────────────────────────────────── -->
      <ng-container *ngIf="activeStep === 2">
        <p class="step-hint">Add one or more date ranges for this campaign.</p>

        <div formArrayName="dates" class="date-rows">
          <div
            *ngFor="let group of dates.controls; let i = index"
            [formGroupName]="i"
            class="date-row"
          >
            <!-- Start Date -->
            <div class="date-field">
              <label>Start Date</label>
              <p-calendar
                formControlName="startDate"
                placeholder="Pick a date"
                dateFormat="yy-mm-dd"
                [showIcon]="true"
                [minDate]="today"
                appendTo="body"
              />
              <small
                *ngIf="
                  group.get('startDate')?.invalid &&
                  group.get('startDate')?.touched
                "
                class="p-error"
              >
                Required.
              </small>
            </div>

            <span class="date-separator">—</span>

            <!-- End Date -->
            <div class="date-field">
              <label>End Date</label>
              <p-calendar
                formControlName="endDate"
                placeholder="Pick a date"
                dateFormat="yy-mm-dd"
                [showIcon]="true"
                [minDate]="today"
                appendTo="body"
              />
              <small
                *ngIf="
                  group.get('endDate')?.invalid && group.get('endDate')?.touched
                "
                class="p-error"
              >
                Required.
              </small>
            </div>

            <!-- Remove -->
            <div class="date-remove">
              <p-button
                icon="pi pi-trash"
                severity="danger"
                [text]="true"
                [rounded]="true"
                (onClick)="removeDateRow(i)"
              />
            </div>
          </div>
        </div>

        <!-- Add Row -->
        <div class="add-date-btn">
          <p-button
            label="Add date range"
            [text]="true"
            (onClick)="addDateRow()"
          />
        </div>
      </ng-container>

      <!-- ── Error Banner ── -->
      <div *ngIf="errorMessage" class="error-banner">
        <i class="pi pi-exclamation-circle"></i>
        <span>{{ errorMessage }}</span>
      </div>
    </form>
  </ng-template>

  <!-- ── Footer ── -->
  <ng-template pTemplate="footer">
    <div class="footer-actions">
      <p-button
        label="Cancel"
        severity="secondary"
        [outlined]="true"
        (onClick)="cancel()"
        [disabled]="isLoading"
      />

      <p-button
        *ngIf="activeStep > 0"
        label="Back"
        icon="pi pi-arrow-left"
        severity="secondary"
        [outlined]="true"
        (onClick)="prevStep()"
        [disabled]="isLoading"
      />

      <p-button
        *ngIf="activeStep < 2"
        label="Next"
        icon="pi pi-arrow-right"
        iconPos="right"
        (onClick)="nextStep()"
      />

      <p-button
        *ngIf="activeStep === 2"
        label="Create Campaign"
        icon="pi pi-check"
        (onClick)="onSubmit()"
        [loading]="isLoading"
      />

      <p-toast />
      <p-confirmDialog />
      <router-outlet />
    </div>
  </ng-template>
  
  <p-toast></p-toast>

  <p-confirmDialog></p-confirmDialog>

  <router-outlet></router-outlet>
</p-dialog>
