<!-- ─── screen-operating-hour.component.html ─────────────────────────────────
     Side overlay for managing operating hour slots of a single screen.
     - Day dropdown: selects which day you're adding a slot to
     - Slot list: always shows ALL slots, grouped by each day
     ──────────────────────────────────────────────────────────────────────── -->

<p-dialog
  [(visible)]="visible"
  [style]="{ width: '1200px', height: '980px' }"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
>

  <!-- Header -->
  <ng-template pTemplate="header">
    <div class="soh-header">
      <span class="soh-title">
        <i class="pi pi-clock"></i>
        Operating Hours
      </span>
      <span class="soh-screen-name">{{ screen.name }}</span>
    </div>
  </ng-template>

  <div class="soh-body">

    <!-- ── Add Slot Form ─────────────────────────────────────────────────── -->
    <div class="soh-add-form">

      <div class="soh-add-title">Add New Slot</div>

      <div class="soh-form-row">

        <!-- Day selector -->
        <div class="soh-field">
          <label>Day</label>
          <p-dropdown
            [options]="dayOptions"
            [(ngModel)]="selectedDay"
            optionLabel="label"
            optionValue="value"
            placeholder="Select a day"
            styleClass="w-full"
            (onChange)="onDayChange()"
          />
        </div>

        <!-- Start Time -->
        <div class="soh-field">
          <label>Start Time</label>
          <p-calendar
            [formControl]="$any(form.get('startTime'))"
            [timeOnly]="true"
            hourFormat="24"
            placeholder="HH:mm"
            styleClass="w-full"
          />
        </div>

        <!-- End Time -->
        <div class="soh-field">
          <label>End Time</label>
          <p-calendar
            [formControl]="$any(form.get('endTime'))"
            [timeOnly]="true"
            hourFormat="24"
            placeholder="HH:mm"
            styleClass="w-full"
          />
        </div>

        <!-- Avg Audience -->
        <div class="soh-field">
          <label>
            Avg. Audience Count
            <span class="soh-optional">(optional)</span>
          </label>
          <p-inputNumber
            [formControl]="$any(form.get('averageAudienceCount'))"
            placeholder="e.g. 100"
            styleClass="w-full"
            [min]="0"
          />
        </div>

        <!-- Submit -->
        <div class="soh-field soh-field--action">
          <label>&nbsp;</label>
          <p-button
            label="Add Slot"
            icon="pi pi-plus"
            styleClass="w-full"
            [loading]="isSaving"
            [disabled]="form.invalid || selectedDay === null"
            (onClick)="addSlot()"
          />
        </div>

      </div>
    </div>

    <!-- ── All Slots grouped by Day ──────────────────────────────────────── -->
    <div class="soh-slots-section">

     <!-- Replace the spinner inside soh-slots-label with this block below it -->
<div class="soh-loading-overlay" *ngIf="isLoadingSlots">
  <p-progressSpinner strokeWidth="4" />
</div>

      <!-- One block per day — always rendered -->
      <div class="soh-day-group" *ngFor="let day of dayOptions">

        <div class="soh-day-header">
          <span class="soh-day-label">{{ day.label }}</span>
          <span class="soh-slot-count">
            {{ (slotsByDay[day.value] || []).length }} slot(s)
          </span>
        </div>

        <!-- Empty state for this day -->
        <div
          class="soh-empty"
          *ngIf="!isLoadingSlots && (slotsByDay[day.value] || []).length === 0"
        >
          No slots for this day.
        </div>

        <!-- Slot rows for this day -->
        <div
          class="soh-slot-row"
          *ngFor="let slot of slotsByDay[day.value]"
        >
          <span class="soh-slot-time">
            <i class="pi pi-clock"></i>
            {{ formatTime(slot.startTime) }} – {{ formatTime(slot.endTime) }}
          </span>

          <span class="soh-slot-audience" *ngIf="slot.averageAudienceCount !== null">
            <i class="pi pi-users"></i>
            {{ slot.averageAudienceCount }}
          </span>

          <p-button
            icon="pi pi-trash"
            severity="danger"
            [text]="true"
            size="small"
            [loading]="isDeletingId === slot.id"
            (onClick)="deleteSlot(slot)"
          />
        </div>

      </div><!-- /soh-day-group -->

    </div><!-- /soh-slots-section -->

    <!-- Error -->
    <p-message
      *ngIf="errorMessage"
      severity="error"
      [text]="errorMessage"
      styleClass="w-full mt-2"
    />

  </div><!-- /soh-body -->

</p-dialog>
