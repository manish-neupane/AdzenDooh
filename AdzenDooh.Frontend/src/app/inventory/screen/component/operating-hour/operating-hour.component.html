<!-- ─── screen-operating-hour.component.html ─────────────────────────────────
     Side overlay for managing operating hour slots of a single screen.
     Opens as p-sidebar from the right.
     ──────────────────────────────────────────────────────────────────────── -->

<p-dialog
  [(visible)]="visible"
  header="Operating Hours"
  [style]="{ width: '1200px' , height: '980px' }"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
>

  <!-- // Header// -->
   
  <ng-template pTemplate="header">
    <div class="soh-header">
      <span class="soh-title">
        <i class="pi pi-clock"></i>
        Operating Hours
      </span>
      <span class="soh-screen-name">{{ screen.name }}</span>
    </div>
  </ng-template>

  
  <div class="soh-body">

    <!-- Day Dropdown -->
    <div class="soh-field">
      <label>Day</label>
      <p-dropdown
        [options]="dayOptions"
        [(ngModel)]="selectedDay"
        optionLabel="label"
        optionValue="value"
        placeholder="Select a day"
        styleClass="w-full"
        (onChange)="onDayChange()"
      />
    </div>

    <!-- Slot List for selected day -->
    <div class="soh-slots" *ngIf="selectedDay !== null">

      <div class="soh-slots-label">
        Existing Slots
        <p-progressSpinner
          *ngIf="isLoadingSlots"
          styleClass="soh-spinner"
          strokeWidth="4"
        />
      </div>

      <!-- Empty state -->
      <div class="soh-empty" *ngIf="!isLoadingSlots && filteredSlots.length === 0">
        No slots for this day yet.
      </div>

      <!-- Slot rows -->
      <div
        class="soh-slot-row"
        *ngFor="let slot of filteredSlots"
      >
        <span class="soh-slot-time">
          <i class="pi pi-clock"></i>
          {{ formatTime(slot.startTime) }} – {{ formatTime(slot.endTime) }}
        </span>

        <span class="soh-slot-audience" *ngIf="slot.averageAudienceCount !== null">
          <i class="pi pi-users"></i>
          {{ slot.averageAudienceCount }}
        </span>

        <p-button
          icon="pi pi-trash"
          severity="danger"
          [text]="true"
          size="small"
          [loading]="isDeletingId === slot.id"
          (onClick)="deleteSlot(slot)"
        />
      </div>
    </div>

    <!-- ── Add Slot Form (only shown when a day is selected) ─────────────── -->
    <div class="soh-add-form" *ngIf="selectedDay !== null">

      <div class="soh-add-title">Add New Slot</div>

      <div class="soh-form-row">

        <div class="soh-field">
          <label>Start Time</label>
          <p-calendar
            [formControl]="$any(form.get('startTime'))"
            [timeOnly]="true"
            hourFormat="24"
            placeholder="HH:mm"
            styleClass="w-full"
          />
        </div>

        <div class="soh-field">
          <label>End Time</label>
          <p-calendar
            [formControl]="$any(form.get('endTime'))"
            [timeOnly]="true"
            hourFormat="24"
            placeholder="HH:mm"
            styleClass="w-full"
          />
        </div>

      </div>

      <div class="soh-field">
        <label>Avg. Audience Count <span class="soh-optional">(optional)</span></label>
        <p-inputNumber
          [formControl]="$any(form.get('averageAudienceCount'))"
          placeholder="e.g. 100"
          styleClass="w-full"
          [min]="0"
        />
      </div>

      <p-button
        label="Add Slot"
        icon="pi pi-plus"
        styleClass="w-full"
        [loading]="isSaving"
        [disabled]="form.invalid"
        (onClick)="addSlot()"
      />

    </div>

    <!-- Error -->
    <p-message
      *ngIf="errorMessage"
      severity="error"
      [text]="errorMessage"
      styleClass="w-full mt-2"
    />

  </div>

</p-dialog>
