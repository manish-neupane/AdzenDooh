<p-dialog
  [(visible)]="isOpen"
  [header]="isNewScreen ? 'Create Screen' : 'Edit Screen'"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '40rem' }"
  appendTo="body"
  (onHide)="onHide()"
>
  <ng-template pTemplate="content">
    <form [formGroup]="formGroup" class="screen-form p-fluid">
      <!-- Name -->
      <div class="field">
        <label for="name">Name <span class="required">*</span></label>
        <input id="name" type="text" pInputText formControlName="name" />
        <small
          *ngIf="
            formGroup.get('name')?.invalid && formGroup.get('name')?.touched
          "
          class="p-error"
        >
          Name is required.
        </small>
      </div>

      <!-- Resolution -->
      <div class="field">
        <label for="resolution"
          >Resolution <span class="required">*</span></label
        >
        <p-dropdown
          id="resolution"
          formControlName="resolution"
          placeholder="Select a resolution"
          [options]="[
            { label: '1920x1080 (Full HD)', value: '1920x1080' },
            { label: '1280x720 (HD)', value: '1280x720' },
            { label: '1366x768', value: '1366x768' },
            { label: '3840x2160 (4K UHD)', value: '3840x2160' },
            { label: '2560x1440 (2K QHD)', value: '2560x1440' },
            { label: '1600x900', value: '1600x900' },
            { label: '1024x768', value: '1024x768' },
            { label: '1280x1024', value: '1280x1024' },
          ]"
          optionLabel="label"
          optionValue="value"
          [style]="{ width: '100%' }"
        />
        <small
          *ngIf="
            formGroup.get('resolution')?.invalid &&
            formGroup.get('resolution')?.touched
          "
          class="p-error"
        >
          Resolution is required.
        </small>
      </div>

      <!-- Orientation -->
      <div class="field">
        <label for="orientation">Orientation</label>
        <p-dropdown
          id="orientation"
          formControlName="orientation"
          placeholder="Select orientation"
          [options]="[
            { label: 'Portrait', value: 'Portrait' },
            { label: 'Landscape', value: 'Landscape' },
          ]"
          optionLabel="label"
          optionValue="value"
          [style]="{ width: '100%' }"
        />
      </div>

      <!-- MAC Address -->
<div class="field">
  <label for="macAddress"
    >MAC Address <span class="required">*</span></label
  >
  <input
    id="macAddress"
    type="text"
    pInputText
    formControlName="macAddress"
    placeholder="e.g. AA:BB:CC:DD:EE:FF"
    [readonly]="!isNewScreen"
  />
  <small
    *ngIf="
      formGroup.get('macAddress')?.invalid &&
      formGroup.get('macAddress')?.touched
    "
    class="p-error"
  >
    MAC Address is required.
  </small>
</div>
  <!-- Location -->
<div class="field">
  <label for="location">
    Location <span class="required">*</span>
  </label>

  <div class="location-wrapper">

    <input
      id="location"
      type="text"
      pInputText
      formControlName="location"
      placeholder=" Enter coordinates (e.g. 27.7172, 85.3240)"
    />

    <p-button
      icon="pi pi-map-marker"
      label="Map"
      severity="secondary"
      type="button"
      (onClick)="openMapPicker()"
    />

  </div>

  <small
    *ngIf="
      formGroup.get('location')?.invalid &&
      formGroup.get('location')?.touched
    "
    class="p-error"
  >
    Location is required.
  </small>
</div>

      <!-- Address (optional) -->
      <div class="field">
        <label for="address">Address</label>
        <input id="address" type="text" pInputText formControlName="address" />
      </div>

      <!-- status -->
      <div class="field" style="margin-bottom: 3rem;">
        <label for="status">Status</label>
        <p-dropdown
          id="status"
          formControlName="status"
          placeholder="Select status"
          [options]="[
            { label: 'Active', value: 'Active' },
            { label: 'Inactive', value: 'Inactive' },
          ]"
          optionLabel="label"
          optionValue="value"
          [style]="{ width: '100%' }"
        />
      </div>
    </form>
  </ng-template>

  <!-- Footer Actions -->
  <ng-template pTemplate="footer">
    <p-button
      label="Cancel"
      severity="secondary"
      [outlined]="true"
      (onClick)="cancel()"
      [disabled]="isLoading"
    />
    <p-button
      label="Save"
      icon="pi pi-check"
      (onClick)="onSubmit()"
      [loading]="isLoading"
    />
  </ng-template>
</p-dialog>



<!-- ─────────────────────────────────────────────── -->
<!-- MAP PICKER DIALOG -->
<!-- ─────────────────────────────────────────────── -->
<p-dialog
  [(visible)]="isMapDialogOpen"
  header="Select Location"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '900px', height: '700px' }"
  appendTo="body"
>

  <div class="map-dialog-body">

    <!-- Search -->
    <div class="map-toolbar">

      <input
        type="text"
        pInputText
        placeholder="Search location..."
        [(ngModel)]="mapSearchText"
      />

      <p-button
        icon="pi pi-search"
        label="Search"
        severity="secondary"
        type="button"
      />

      <p-button
        icon="pi pi-crosshairs"
        label="Use Current Location"
        severity="contrast"
        type="button"
      />

    </div>

    <!-- Selected Coordinates -->
    <div class="map-coordinates">

      <div class="coord-box">
        <label>Latitude</label>
        <input
          type="text"
          pInputText
          [value]="selectedLatitude"
          readonly
        />
      </div>

      <div class="coord-box">
        <label>Longitude</label>
        <input
          type="text"
          pInputText
          [value]="selectedLongitude"
          readonly
        />
      </div>

    </div>

    <!-- Actual Map -->
    <div id="screen-map"></div>

  </div>

  <!-- Footer -->
  <ng-template pTemplate="footer">

    <p-button
      label="Cancel"
      severity="secondary"
      [outlined]="true"
      type="button"
      (onClick)="isMapDialogOpen = false"
    />

    <p-button
      label="Use This Location"
      icon="pi pi-check"
      type="button"
      (onClick)="confirmMapLocation()"
    />

  </ng-template>

</p-dialog>
