<!-- ─── screen-list.component.html ──────────────────────────────────────────
     This template owns only two things:
       1. The top toolbar (page title + Add button)
       2. The grid-table shell + the create/edit dialog

     All table rendering lives inside <grid-table>.
     All form/dialog rendering lives inside <screen-create-edit>.
     ─────────────────────────────────────────────────────────────────────── -->

<page-wrapper>

  <!-- ── Page Header ──────────────────────────────────────────────────────── -->
  <div title>Screens</div>

  <div actions>
    <p-button
      label="Add Screen"
      icon="pi pi-plus"
      (onClick)="openAddScreen()"
    />
  </div>

  <!-- ── Grid ─────────────────────────────────────────────────────────────── -->
  <grid-table
    [config]="screenConfig"
    [loading]="isLoading"
    [error]="errorMessage"
    (pageChange)="onPage($event)"
    (sortChange)="onSort($event)"
    (filterChange)="onFilter($event)"
  />

</page-wrapper>

<!-- ── Create / Edit Dialog ───────────────────────────────────────────────────
     Lives outside the wrapper div so it is never clipped by overflow rules.
     The #screenCreateEdit ref is used by the TS to call open() directly.
     ─────────────────────────────────────────────────────────────────────── -->
<screen-create-edit
  #screenCreateEdit
  [screen]="currentScreen"
  (afterFormClosed)="afterFormClosed($event)"
/>
<screen-operating-hour
  #screenOperatingHour
  [screen]="currentScreen"
/>
