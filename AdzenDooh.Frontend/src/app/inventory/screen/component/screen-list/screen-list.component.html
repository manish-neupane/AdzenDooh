<div class="screen-list-wrapper">
  <grid-table
    [config]="screenConfig"
    [loading]="isLoading"
    [error]="errorMessage"
    (pageChange)="onPage($event)"
    (sortChange)="onSort($event)">
  </grid-table>
</div>

<screen-create-edit #screenCreateEdit 
[screen]="currentScreen"
(afterFormClosed)="afterFormClosed($event)"/>
