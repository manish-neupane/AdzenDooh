<div class="grid-wrapper">

  <div class="search-bar">
    <i class="pi pi-search search-icon"></i>
    <input
      pInputText
      type="text"
      placeholder="Search..."
      class="search-input"
      (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
  </div>



  <p-table
    
  #dt
    [value]="config.dataSource.data"
    [paginator]="true"
    [rows]="pageRows"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [globalFilterFields]="filterFields"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    styleClass="p-datatable-striped p-datatable-sm p-datatable-gridlines">

    <ng-template pTemplate="header">
  <tr>
    <th *ngFor="let col of config.columns" [pSortableColumn]="col.name">
      <div class="th-content">
        {{ col.columnName }}
        <p-sortIcon [field]="col.name" />
      </div>
    </th>
    <th *ngIf="config.showActions" class="actions-col">Actions</th>
  </tr>
</ng-template>

<ng-template pTemplate="body" let-row>
  <tr>
    <td *ngFor="let col of config.columns">{{ getValue(row, col.name) }}</td>
    <td *ngIf="config.showActions">
      <div class="action-buttons">
        <p-button *ngFor="let action of config.actions"
          [icon]="action.icon"
          [severity]="action.severity"
          [text]="true"
          [rounded]="true"
          [pTooltip]="action.tooltip"
          tooltipPosition="top"
          (onClick)="action.handler(row)" />
      </div>
    </td>
  </tr>
</ng-template>


<ng-template pTemplate="emptymessage">
  <tr>
    <td [attr.colspan]="config.columns.length + (config.showActions ? 1 : 0)" class="empty-message">
      <i class="pi pi-inbox"></i>
      <span>No data found</span>
    </td>
  </tr>
</ng-template>


  </p-table>

</div>
