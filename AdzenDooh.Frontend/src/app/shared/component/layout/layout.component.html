<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" [class.collapsed]="isCollapsed">

    <!-- HEADER -->
    <div class="sidebar-header">

      <div class="logo">
        <i class="pi pi-desktop logo-icon"></i>

        <div class="logo-text" *ngIf="!isCollapsed">
          <div class="title">AdZen Dooh</div>
          <div class="subtitle">Ad Operations</div>
        </div>
      </div>

      <button
        pButton
        type="button"
        icon="pi"
        [icon]="isCollapsed ? 'pi pi-angle-right' : 'pi pi-angle-left'"
        class="p-button-text toggle-btn"
        (click)="toggleSidebar()"
        pTooltip="Toggle Sidebar"
        tooltipPosition="right">
      </button>

    </div>

    <!-- NAVIGATION -->
    <nav class="nav">

      <ng-container *ngFor="let group of navGroups">

        <!-- GROUP TITLE -->
        <div class="nav-group-title" *ngIf="!isCollapsed">
          {{ group }}
        </div>

        <!-- ITEMS -->
        <a
          *ngFor="let item of itemsByGroup(group)"
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-item"
          pRipple
          pTooltip="{{ isCollapsed ? item.label : '' }}"
          tooltipPosition="right">

          <i [class]="item.icon"></i>

          <span class="label" *ngIf="!isCollapsed">
            {{ item.label }}
          </span>

        </a>

      </ng-container>

    </nav>

    <!-- FOOTER -->
    <div class="sidebar-footer">

      <p-avatar
        icon="pi pi-user"
        shape="circle"
        size="normal">
      </p-avatar>

      <div class="user-info" *ngIf="!isCollapsed">
        <div class="name">Admin</div>
        <div class="role">Super User</div>
      </div>

    </div>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>

</div>
